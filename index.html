<!DOCTYPE html>
<html class="dark" lang="id">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
   <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3c83f6",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101722",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]

                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",

        body { font-family: 'Inter', sans-serif; }

                                        <div className="w-full h-full bg-center bg-no-repeat bg-cover transition-transform duration-500 group-hover:scale-105" style={{backgroundImage: `url(${item.img})`}}></div>
                                        <div className="absolute top-3 left-3 z-20">
                                            <span className="px-3 py-1 bg-slate-900/80 backdrop-blur-md text-white text-xs font-bold rounded-full uppercase tracking-wider border border-white/10">{item.tag}</span>
                                        </div>
                                    </div>
                                    <div className="p-5 flex flex-col gap-2">
                                        <h3 className="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight group-hover:text-primary transition-colors">{item.title}</h3>
                                        <p className="text-slate-600 dark:text-slate-400 text-sm leading-relaxed">{item.desc}</p>
                                        <div className="flex items-center gap-2 mt-2 text-primary text-sm font-semibold">
                                            <span>Lihat Detail</span>
                                            <span className="material-symbols-outlined text-sm">arrow_forward</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </main>
            );
        };

        const TentangPage = () => (
            <main className="flex flex-1 flex-col items-center">
                <div className="w-full max-w-[1200px] px-6 py-12 md:py-20 flex flex-col gap-16">
                    <div className="flex flex-col gap-4">
                        <h1 className="text-4xl md:text-6xl font-black tracking-tight text-slate-900 dark:text-white">Tentang Saya</h1>
                        <div className="h-1.5 w-24 bg-primary rounded-full"></div>
                    </div>
                    <div className="flex flex-col items-center w-full">
                        <div className="w-full max-w-3xl flex flex-col gap-8">
                            <div className="flex flex-col gap-4">
                                <span className="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold tracking-wider uppercase bg-primary/20 text-primary w-fit">Web Developer Profesional</span>
                                <h2 className="text-3xl font-bold text-slate-900 dark:text-white leading-snug">Membangun Solusi Digital dengan Kreativitas dan Kode.</h2>
                                <p className="text-lg text-slate-600 dark:text-slate-400 leading-relaxed">
                                    Saya adalah seorang pengembang web yang berdedikasi untuk menciptakan aplikasi modern yang skalabel dan berpusat pada pengguna. Dengan fokus pada efisiensi sistem dan estetika desain, saya membantu bisnis mengubah ide kompleks menjadi kenyataan digital yang fungsional.
                                </p>
                            </div>
                            <div className="flex flex-col gap-5">
                                <h3 className="text-sm font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">Spesialisasi & Minat</h3>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    {[
                                        {icon: "code", label: "Pemrograman"},
                                        {icon: "palette", label: "Desain Modern"},
                                        {icon: "hub", label: "Perancangan Sistem"},
                                        {icon: "bolt", label: "Skill Teknologi"}
                                    ].map(spec => (
                                        <div key={spec.label} className="flex items-center gap-3 p-4 rounded-lg bg-slate-100 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700">
                                            <span className="material-symbols-outlined text-primary">{spec.icon}</span>
                                            <span className="font-medium">{spec.label}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        );

        const KontakPage = () => (
            <main className="flex-1 flex flex-col items-center justify-center px-6 lg:px-40 py-12">
                <div className="text-center mb-12">
                    <span className="text-primary font-bold tracking-widest uppercase text-xs">Ayo Terhubung</span>
                    <h1 className="text-slate-900 dark:text-white text-4xl md:text-5xl font-extrabold mt-2">Tertarik Berdiskusi?</h1>
                    <p className="text-slate-500 dark:text-slate-400 mt-4 max-w-lg mx-auto">Saya selalu terbuka untuk kolaborasi baru, proyek kreatif, atau sekadar menyapa teman baru di industri ini.</p>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-5xl mb-20">
                    {[
                        { icon: "mail", title: "Email", value: "ferdyanwar@example.com", action: "Kirim Pesan", link: "mailto:ferdy@example.com" },
                        { icon: "photo_camera", title: "Instagram", value: "@ferd.yonces", action: "Ikuti Saya", link: "#" },
                        { icon: "terminal", title: "GitHub", value: "github.com/ferdy", action: "Lihat Repositori", link: "#" }
                    ].map((contact, idx) => (
                        <div key={idx} className="flex flex-col gap-4 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 p-6 hover:border-primary/50 transition-colors group">
                            <div className="text-primary bg-primary/10 size-12 rounded-lg flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-all">
                                <span className="material-symbols-outlined">{contact.icon}</span>
                            </div>
                            <div className="flex flex-col gap-1">
                                <h2 className="text-slate-900 dark:text-white text-lg font-bold">{contact.title}</h2>
                                <p className="text-slate-500 dark:text-slate-400 text-sm">{contact.value}</p>
                            </div>
                            <a className="mt-2 text-primary text-sm font-semibold flex items-center gap-2" href={contact.link}>
                                {contact.action} <span className="material-symbols-outlined text-sm">arrow_forward</span>
                            </a>
                        </div>
                    ))}
                </div>
                <div className="w-full max-w-5xl rounded-2xl bg-slate-900 dark:bg-primary/10 border border-slate-800 dark:border-primary/20 p-8 md:p-16 text-center overflow-hidden relative">
                    <div className="absolute -top-24 -right-24 size-64 bg-primary/20 rounded-full blur-3xl"></div>
                    <div className="absolute -bottom-24 -left-24 size-64 bg-primary/10 rounded-full blur-3xl"></div>
                    <div className="relative z-10 flex flex-col items-center gap-8">
                        <h2 className="text-white text-3xl md:text-5xl font-black leading-tight max-w-2xl">Siap Berkembang Bersama? Hubungi Saya Sekarang</h2>
                        <button className="flex min-w-[240px] cursor-pointer items-center justify-center rounded-full h-14 px-8 bg-primary text-white text-lg font-bold hover:scale-105 active:scale-95 transition-all shadow-xl shadow-primary/25">Hubungi Saya Sekarang</button>
                    </div>
                </div>
            </main>
        );

        // --- App Component ---

        const App = () => {
            return (
                <MemoryRouter>
                    <div className="relative flex min-h-screen w-full flex-col overflow-x-hidden">
                        <Navigation />
                        <Routes>
                            <Route path="/" element={<HomePage />} />
                            <Route path="/kompetensi" element={<KompetensiPage />} />
                            <Route path="/proyek" element={<ProyekPage />} />
                            <Route path="/galeri" element={<GaleriPage />} />
                            <Route path="/tentang" element={<TentangPage />} />
                            <Route path="/kontak" element={<KontakPage />} />
                        </Routes>
                        <Footer />
                    </div>
                </MemoryRouter>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
